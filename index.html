    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            color: white;
        }
        body {
             background-color: cyan;
             position: absolute;
             top: 50%;
             left: 50%;
             transform: translate(-50%,-50%);
             line-height: 1.7;
            font-family: 'Arial', sans-serif;

        }
        .container {
            width: 400px;
            height: 350px;
            text-align: center;
            overflow: hidden;
            box-shadow: 0px 0px 20px 15px rgba(0, 0, 0, 0.356);
            border-radius: 15px;
        }
        .all {
            width: 400px;
            height: 300px;
            padding: 0 20px;
            line-height: 2;
        }
        img {
            border-radius: 50%;
            width: 90px;
            height: 90px;
            margin-top: 15px;
        }
        .all {
            border: solid 1px cyan;
            background-color: cyan;
            border-radius: 10px;
        }
        .small {
            margin-top: 10px;
            height: 500px;
            background-color: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(15, 23, 42, 0.95);
            padding-top: 30px;
        }
        .small:hover {
            position: absolute;
            top: -100;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 40px;
            border-radius: 10px;
            
        }
        button {
            padding: 10px 20px;
            color: black;
            border: rgba(245, 245, 245, 0.363) 1px solid;
            border-radius: 5px;
            margin-top: 15px
            ;
        }
        .container:hover small {
            top: 0;
        }
    </style>
